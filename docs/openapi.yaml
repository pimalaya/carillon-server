openapi: 3.1.0
info:
  title: Carillon control API
  version: "0.0.1"
  summary: Manage watches, probe credentials, meter watch-time, and stream live events.
  description: |
    The REST + SSE control surface of the Carillon watch server. Carillon
    signals, it never syncs: it holds IMAP IDLE and POSTs small, signed,
    **content-free** change events to each watch's notify URL. This API is
    the contract `carillon-admin` (and any third-party UI) builds against.

    All bodies are JSON. Timestamps are unix seconds. Watch-time balances
    are in seconds.
  license:
    name: MIT OR Apache-2.0
servers:
  - url: http://127.0.0.1:3000
    description: Self-host (localhost)
# Default: every operation requires the bearer token (capability link or admin
# token). Public onboarding/health/billing-callback routes opt out with an
# explicit empty `security: []`.
security:
  - capabilityLink: []
tags:
  - name: health
  - name: onboarding
  - name: identity
  - name: watches
  - name: deliveries
  - name: accounts
  - name: billing
  - name: stream

paths:
  /:
    get:
      tags: [health]
      summary: Service metadata
      security: []
      responses:
        "200":
          description: Name, version and useful links.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ServiceInfo" }
  /health:
    get:
      tags: [health]
      summary: Liveness probe
      security: []
      responses:
        "200":
          description: The literal string `ok`.
          content:
            text/plain:
              schema: { type: string, example: ok }
  /openapi.yaml:
    get:
      tags: [health]
      summary: This document
      security: []
      responses:
        "200":
          description: The OpenAPI spec.
          content:
            application/yaml: {}

  /discover:
    post:
      tags: [onboarding]
      summary: Discover email (IMAP) or contacts (CardDAV) config
      security: []
      description: |
        Resolves a "put anything" identifier — an email address, or a bare
        domain / server host — to candidate endpoints and the auth methods
        each accepts, via `io-pim-discovery`. The type-first wizard picks
        `kind` before discovering, so only that protocol is resolved:
        `email` → IMAP (provider rules, PACC, Mozilla autoconfig/ISPDB, RFC
        6186 SRV); `contacts` → CardDAV (RFC 6764 SRV + `.well-known`).
        `choices` are shaped per `kind` (IMAP: host/port/security/auth;
        CardDAV: a context-root url/auth). Every result is a hint the wizard
        confirms/overrides; an unresolvable input returns an empty list
        (manual entry), never an error. Public, rate-limited per client IP.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [input]
              properties:
                input:
                  type: string
                  description: An email address, or a bare domain / server host.
                kind:
                  type: string
                  enum: [email, contacts]
                  default: email
                  description: What to watch — email (IMAP) or contacts (CardDAV).
      responses:
        "200":
          description: The discovered choices for the requested kind (possibly empty).
          content:
            application/json:
              schema:
                type: object
                properties:
                  input: { type: string }
                  kind: { type: string, enum: [email, contacts] }
                  choices:
                    type: array
                    description: >
                      ImapChoice items for kind=email, CardDavChoice items for
                      kind=contacts.
                    items:
                      oneOf:
                        - $ref: "#/components/schemas/ImapChoice"
                        - $ref: "#/components/schemas/CardDavChoice"
        "429":
          description: Too many lookups from this IP.
          headers:
            Retry-After:
              schema: { type: integer }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /oauth/start:
    post:
      tags: [onboarding]
      summary: Begin an OAuth login for a mailbox
      security: []
      description: |
        Resolves the provider (RFC 7591 dynamic registration where the issuer
        offers it — Fastmail — else a known public client for Google/Microsoft),
        builds the authorization URL (S256 PKCE + state), and stashes the flow
        keyed by its CSRF state. The dashboard opens the returned URL in a popup;
        the provider redirects the browser to `/oauth/callback`. Public,
        rate-limited per `(IP, login)`. Send a capability link to add the mailbox
        to that account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [login, imap_host]
              properties:
                issuer: { type: string, description: An OAuth issuer (oauth_issuer choice). }
                authorization_endpoint: { type: string }
                token_endpoint: { type: string }
                scope: { type: string }
                login: { type: string }
                imap_host:
                  type: string
                  description: >
                    IMAP host, or (for a CardDAV login) the DAV host — it keys
                    the mailbox, matching what the poller resolves against.
                imap_port: { type: integer, default: 993 }
                mailbox: { type: string, default: INBOX }
                source_kind:
                  type: string
                  enum: [imap, carddav]
                  default: imap
                  description: What this OAuth login is for.
                carddav_url:
                  type: string
                  format: uri
                  description: >
                    CardDAV collection context-root URL (required when
                    source_kind=carddav). The callback probes it with the bearer
                    token and stores the credential for the poller.
      responses:
        "200":
          description: The provider authorization URL to open.
          content:
            application/json:
              schema:
                type: object
                properties:
                  authorization_url: { type: string, format: uri }
  /oauth/callback:
    get:
      tags: [onboarding]
      summary: OAuth provider redirect (exchanges code, mints link)
      security: []
      description: |
        The provider's redirect. Exchanges the code, verifies the token
        authenticates to IMAP (`OAUTHBEARER`), mints or joins the capability-link
        account (like `/auth`), and stores the encrypted refresh token as the
        mailbox's OAuth credential. Returns an HTML page that posts the result
        back to the dashboard window that opened the popup.
      parameters:
        - { name: state, in: query, required: true, schema: { type: string } }
        - { name: code, in: query, schema: { type: string } }
        - { name: error, in: query, schema: { type: string } }
      responses:
        "200":
          description: HTML that hands the result to the opener via postMessage.
          content:
            text/html: {}
  /test:
    post:
      tags: [onboarding]
      summary: Probe credentials, read-only (no credit spent)
      security: []
      description: |
        Connects, authenticates, inspects capabilities and logs out —
        never selecting a mailbox or spending a credit. For IMAP, `ok` is
        the green light for a watch: reachable **and** authenticated **and**
        IDLE (QRESYNC is a bonus) — not merely authenticated. For CardDAV
        (`source_kind=carddav`), it `PROPFIND`s the `carddav_url` collection
        and `ok` means reachable **and** authenticated **and** a reported
        sync-token. Rate-limited per `(client IP, login)`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TestRequest" }
      responses:
        "200":
          description: The structured verdict (a failed probe is still 200).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TestVerdict" }
        "429":
          description: Too many attempts for this `(IP, login)`.
          headers:
            Retry-After:
              schema: { type: integer }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /mailboxes:
    post:
      tags: [onboarding]
      summary: List a mailbox's selectable folders (for the folder picker)
      security: []
      description: |
        Authenticates and issues `LIST`, returning the selectable folders
        (dropping `\Noselect` containers) with their RFC 6154 special-use
        role where advertised — so onboarding can offer a picker defaulting
        to the inbox. A non-empty `password` authenticates with `LOGIN`
        (unauthenticated, rate-limited per `(IP, login)`); an empty one
        lists an **OAuth** mailbox using the stored credential, which
        requires a capability link (`Authorization: Bearer`). Never spends a
        credit.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MailboxesRequest" }
      responses:
        "200":
          description: The selectable mailboxes (INBOX first).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MailboxesResponse" }
        "400": { description: Could not authenticate or list. }
        "401": { description: OAuth flow with an invalid/missing link. }
        "429": { description: Too many attempts. }

  /addressbooks:
    post:
      tags: [onboarding]
      summary: List a CardDAV account's addressbooks (the contacts target picker)
      security: []
      description: |
        The CardDAV analogue of `/mailboxes`: current-user-principal →
        addressbook-home-set → the collections under it (RFC 5397 + 6352),
        following redirects. Content-free (hrefs + display names only). A
        non-empty `password` authenticates directly; an empty one reuses the
        account's stored credential (requires a capability link). Rate-limited
        per `(IP, login)`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [carddav_url, login]
              properties:
                carddav_url: { type: string, format: uri, description: CardDAV context-root URL. }
                login: { type: string }
                password:
                  type: string
                  description: Empty ⇒ reuse the account's stored credential (needs a link).
      responses:
        "200":
          description: The account's addressbook collections.
          content:
            application/json:
              schema:
                type: object
                properties:
                  addressbooks:
                    type: array
                    items:
                      type: object
                      properties:
                        name: { type: string }
                        url: { type: string, format: uri, description: The collection URL a service watches. }
        "400": { description: Could not authenticate or list. }
        "401": { description: Empty password without a valid link. }
        "429": { description: Too many attempts. }

  /forget:
    post:
      tags: [watches]
      summary: Forget a PIM account (its membership + services + shared credential)
      description: |
        Removes a PIM account: its `(mailbox_key, protocol)` membership and every
        service under it, then drops the identity's **shared** credential only
        when no other protocol of that identity remains. Scoped to the caller's
        Carillon account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mailbox_key, protocol]
              properties:
                mailbox_key: { type: string }
                protocol: { type: string, enum: [imap, carddav] }
      responses:
        "200":
          description: Forgotten.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                  removed: { type: integer, description: Number of services deleted. }
        "403": { description: A capability link is required. }

  /webhook/test:
    post:
      tags: [onboarding]
      summary: Send one signed test event to a notify URL
      security: []
      description: |
        POSTs a single synthetic, HMAC-signed `test` event to `notify_url`
        (signed with `hmac_secret`, exactly like a real delivery, so a
        receiver already verifying accepts it) — the onboarding "Test
        webhook" button. Proves the endpoint is reachable and acking
        **before** activation. Never retried. Rate-limited per IP; the URL
        must pass the same https-or-loopback policy as a watch.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WebhookTestRequest" }
      responses:
        "200":
          description: The delivery outcome (a non-acking endpoint is still 200).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WebhookTestResult" }
        "400": { description: Invalid notify URL. }
        "429": { description: Too many attempts. }

  /auth:
    post:
      tags: [identity]
      summary: Prove control of a mailbox (login-less account)
      security: []
      description: |
        Authenticating proves control. First auth creates an account and
        mints its capability link; a re-auth to a member mailbox recovers
        (re-mints) the link; an auth carrying a valid link (`Authorization:
        Bearer`) adds the mailbox to that account. Rate-limited per
        `(IP, login)`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AuthRequest" }
      responses:
        "200":
          description: The account and its capability link.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthResult" }
        "401": { description: Authentication failed. }
        "429": { description: Too many attempts. }
  /me:
    get:
      tags: [identity]
      summary: The account behind the capability link
      security: [{ capabilityLink: [] }]
      responses:
        "200":
          description: Members, watches and balance.
          content:
            application/json: {}
        "401": { description: Invalid or missing link. }
  /signout:
    post:
      tags: [identity]
      summary: Revoke the presented capability link
      security: [{ capabilityLink: [] }]
      responses:
        "200": { description: Revoked (or already gone). }

  /auth/magic/request:
    post:
      tags: [identity]
      summary: Email a single-use magic-link sign-in
      security: []
      description: |
        Magic-link is the human identity flow (§ BILLING_MODEL) and the sybil
        barrier for the free credit — a new account needs a real inbox. Emails a
        single-use link; opening it mints a capability link. Rate-limited per
        `(IP, email)`. A delivery failure is surfaced (the user must get the link).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        "200": { description: The sign-in email was sent. }
        "400": { description: Invalid email. }
        "429": { description: Too many attempts. }
        "502": { description: Could not send the email; try again. }
  /auth/magic/verify:
    get:
      tags: [identity]
      summary: Complete a magic-link sign-in (browser)
      security: []
      description: |
        What the emailed link opens. Consumes the token and hands the minted
        capability link to the dashboard window that opened it (`postMessage`),
        mirroring the OAuth popup.
      parameters:
        - in: query
          name: token
          required: true
          schema: { type: string }
      responses:
        "200": { description: HTML popup that posts the result to the dashboard. }
    post:
      tags: [identity]
      summary: Exchange a magic-link token for a capability link
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token: { type: string }
      responses:
        "200":
          description: "`{ account_id, link }` — the account and its capability link."
          content:
            application/json: {}
        "401": { description: Invalid or expired sign-in link. }

  /watches/{id}/activate:
    post:
      tags: [billing]
      summary: Spend credits to start (or extend) a service's watching
      security: [{ capabilityLink: [] }]
      parameters: [{ $ref: "#/components/parameters/WatchId" }]
      description: |
        Draws `credits` credits from the pool (default 1) to give the service
        (watch) that many months of watching (§ BILLING_MODEL); the time stacks
        onto any still remaining. All-or-nothing — if the pool can't cover the
        amount nothing is spent. It starts on the next reconcile.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                credits:
                  type: integer
                  minimum: 1
                  default: 1
                  description: Credits to spend = months of watching to add.
      responses:
        "200":
          description: "`{ id, watching_until, credits }` (credits = pool remaining)."
          content:
            application/json: {}
        "402": { description: The pool can't cover it — buy a pack first. }
        "404": { description: The caller does not own that service. }
  /watches/{id}/auto-renew:
    post:
      tags: [billing]
      summary: Toggle auto-renew for a service
      security: [{ capabilityLink: [] }]
      parameters: [{ $ref: "#/components/parameters/WatchId" }]
      description: |
        When on, the next credit is drawn from the pool at expiry instead of
        stopping. Off by default.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled: { type: boolean }
      responses:
        "200": { description: "`{ id, auto_renew }`." }
        "404": { description: The caller does not own that service. }
  /billing/checkout:
    post:
      tags: [billing]
      summary: Buy credit packs in one payment
      security: [{ capabilityLink: [] }]
      description: |
        The only refill unit is a pack of 5 credits (§ BILLING_MODEL); `packs`
        is the number of packs.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                packs: { type: integer, minimum: 1, default: 1 }
      responses:
        "200":
          description: >
            A pending session and the provider checkout URL (Stripe hosted
            Checkout, `mode=payment`). Send the buyer to `checkout_url`; the
            pool is topped up on the verified webhook.
          content:
            application/json: {}
        "400": { description: Invalid pack count, or the provider rejected checkout. }
  /billing/webhook:
    post:
      tags: [billing]
      summary: Provider payment callback (verify signature, credit the pool)
      security: []
      description: |
        The provider's raw event. For Stripe, the `Stripe-Signature` header
        HMAC is verified over the **raw body** (within a 5-minute skew) before
        anything is trusted. A paid `checkout.session.completed` tops the
        account's pool up by the quantity the session recorded (idempotent
        against retries). The stub provider trusts a `{session_id}` body.
      requestBody:
        required: true
        description: The provider's raw event body (do not re-serialize).
        content:
          application/json: {}
      responses:
        "200": { description: Applied or ignored (idempotent). }
        "400": { description: Signature verification failed. }

  /watches:
    get:
      tags: [watches]
      summary: List watches
      responses:
        "200":
          description: Every watch (never the password or HMAC secret).
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/WatchView" }
    post:
      tags: [watches]
      summary: Create a watch
      description: |
        The credential lives on the service (§ SERVICE_MODEL v3): pass the
        mailbox `password` and it is stored (encrypted) on the watch — no prior
        `/auth` step is required. Omit the password only to reuse a stored OAuth
        credential (proven at `/oauth/callback`), which still requires that
        mailbox to have been signed in. A free-trial head start is granted on the
        account's **first service per provider** (the resolved provider domain).
        Notify URL must be `https://` (loopback `http://` is allowed for local
        sinks). Declaring a service is free; on the metered SaaS it only starts
        once activated (`POST /watches/{id}/activate`). **No same-target dedup**:
        adding the same folder/addressbook twice is allowed (e.g. a second
        webhook endpoint) and simply billed twice. A scoped account may watch up
        to the fair-use cap of distinct mailboxes; beyond it, `402`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateWatch" }
      responses:
        "201":
          description: Created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, const: ok }
                  id: { type: string }
                  free_trial:
                    description: >
                      Whether a free-trial head start was granted (§ SERVICE_MODEL
                      v3): the account's FIRST service on this provider auto-
                      watches free for a week, no credit spent.
                    type: boolean
                  provider:
                    description: >
                      The provider domain the service was grouped and trial-gated
                      under — the registrable domain of the server host, e.g.
                      `fastmail.com` for both `imap.` and `carddav.` hosts.
                    type: string
        "400":
          description: Invalid notify URL.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "402":
          description: Fair-use mailbox cap reached — a volume plan is needed.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "403":
          description: >
            No credential: the password was omitted for a mailbox that has not
            been signed in with OAuth. Provide the password instead.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /watches/{id}:
    delete:
      tags: [watches]
      summary: Delete a watch
      parameters: [{ $ref: "#/components/parameters/WatchId" }]
      responses:
        "200": { description: Deleted. }
        "404":
          description: No such watch.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /watches/{id}/pause:
    post:
      tags: [watches]
      summary: Pause a watch (stops watching and debiting)
      parameters: [{ $ref: "#/components/parameters/WatchId" }]
      responses:
        "200": { description: Paused. }
        "404": { description: No such watch. }
  /watches/{id}/resume:
    post:
      tags: [watches]
      summary: Resume a watch
      description: Only starts if the account still has watch-time credit.
      parameters: [{ $ref: "#/components/parameters/WatchId" }]
      responses:
        "200": { description: Resumed. }
        "404": { description: No such watch. }
  /watches/{id}/rotate-secret:
    post:
      tags: [watches]
      summary: Rotate the HMAC secret (with an overlap window)
      description: |
        The previous secret keeps being signed with until it expires, so a
        receiver can update without dropping events. Omit `new_secret` to
        have one generated and returned.
      parameters: [{ $ref: "#/components/parameters/WatchId" }]
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RotateRequest" }
      responses:
        "200":
          description: Rotated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, const: ok }
                  secret: { type: string }
                  prev_expires_at: { type: integer }
        "404": { description: No such watch. }

  /deliveries:
    get:
      tags: [deliveries]
      summary: Recent delivery log
      parameters:
        - name: account
          in: query
          schema: { type: string }
          description: Filter by watch id.
        - name: limit
          in: query
          schema: { type: integer, default: 50, minimum: 1, maximum: 1000 }
      responses:
        "200":
          description: Newest first.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/DeliveryView" }

  /accounts:
    get:
      tags: [accounts]
      summary: List Carillon accounts with their credit pool and PIM accounts
      responses:
        "200":
          description: Every account.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AccountView" }
  /accounts/{id}:
    get:
      tags: [accounts]
      summary: One account's credit pool and per-PIM-account activation state
      parameters: [{ $ref: "#/components/parameters/AccountId" }]
      responses:
        "200":
          description: The account view.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AccountView" }
        "404": { description: No such account. }

  /events:
    get:
      tags: [stream]
      summary: Live event stream (Server-Sent Events)
      description: |
        A `text/event-stream` of delivery outcomes (`event: delivery`),
        watch status changes (`event: status`) and metering notices
        (`event: notice`). Content-free. Consume with `EventSource`.
      responses:
        "200":
          description: The SSE stream.
          content:
            text/event-stream:
              schema: { type: string }

components:
  securitySchemes:
    capabilityLink:
      type: http
      scheme: bearer
      description: >
        The bearer token behind `Authorization: Bearer <token>`. Normally a
        per-account **capability link**, which scopes every data route to that
        account's own watches, deliveries, events and pool. A deployment may
        also configure a master **admin token** (`api.admin_token`) that this
        same scheme accepts for **unscoped** fleet-wide access (ops / headless
        self-host). Every data route requires one of these; there is no
        unauthenticated access to watches, deliveries or events.
  parameters:
    WatchId:
      name: id
      in: path
      required: true
      schema: { type: string }
    AccountId:
      name: id
      in: path
      required: true
      schema: { type: string }
  schemas:
    ServiceInfo:
      type: object
      properties:
        name: { type: string }
        version: { type: string }
        openapi: { type: string }
        docs: { type: string }
    Error:
      type: object
      properties:
        error: { type: string }
    TestRequest:
      type: object
      required: [imap_host, login]
      properties:
        source_kind:
          type: string
          enum: [imap, carddav]
          default: imap
          description: >
            Protocol to probe. `imap` (default) probes an IMAP mailbox;
            `carddav` probes the `carddav_url` collection instead.
        imap_host:
          type: string
          description: >
            IMAP host, or — for a CardDAV probe — the PIM-account host that
            keys the stored credential (the collection lives in `carddav_url`).
        imap_port: { type: integer, default: 993 }
        login: { type: string }
        password:
          type: string
          description: >
            The credential. May be empty for a CardDAV probe that reuses the
            PIM account's stored credential (then a capability link is required).
        mailbox: { type: string, default: INBOX }
        carddav_url:
          type: string
          format: uri
          description: "CardDAV collection URL (required when source_kind=carddav)."
    TestVerdict:
      type: object
      properties:
        ok:
          type: boolean
          description: >
            The green light. IMAP: reachable && authenticated && idle.
            CardDAV: reachable && authenticated && sync.
        reachable: { type: boolean }
        authenticated: { type: boolean }
        idle: { type: boolean, description: "IMAP only; false for CardDAV." }
        qresync: { type: boolean, description: "IMAP only; false for CardDAV." }
        condstore: { type: boolean, description: "IMAP only; false for CardDAV." }
        sync:
          type: boolean
          description: >
            CardDAV only: the collection reports a change token (RFC 6578
            sync-token or a CalendarServer ctag), so it can be polled. False
            for IMAP.
        missing:
          type: array
          items: { type: string }
        error: { type: [string, "null"] }
    MailboxesRequest:
      type: object
      required: [imap_host, login]
      properties:
        imap_host: { type: string }
        imap_port: { type: integer, default: 993 }
        login: { type: string }
        password:
          type: string
          description: >
            Non-empty ⇒ authenticate with LOGIN. Empty ⇒ OAuth (uses the
            stored credential; requires a capability link).
    MailboxEntry:
      type: object
      properties:
        name: { type: string, description: Unicode mailbox name (e.g. INBOX). }
        role:
          type: [string, "null"]
          description: >
            RFC 6154 special-use role where advertised (inbox, sent, drafts,
            junk, trash, archive, all, flagged), else null.
    MailboxesResponse:
      type: object
      properties:
        mailboxes:
          type: array
          items: { $ref: "#/components/schemas/MailboxEntry" }
    WebhookTestRequest:
      type: object
      required: [notify_url, hmac_secret]
      properties:
        notify_url: { type: string, format: uri }
        hmac_secret: { type: string }
    WebhookTestResult:
      type: object
      properties:
        ok: { type: boolean, description: The endpoint answered with a 2xx. }
        status: { type: [integer, "null"], description: The HTTP status, if any. }
        error: { type: [string, "null"] }
    ImapChoice:
      type: object
      description: >
        One onboarding choice — a server endpoint + a single auth method,
        grouped across discovery mechanisms (the mechanism is not exposed).
        A hint the wizard confirms.
      properties:
        host: { type: string }
        port: { type: integer }
        security: { type: string, enum: [tls, starttls, plain] }
        auth: { $ref: "#/components/schemas/AuthMethod" }
    CardDavChoice:
      type: object
      description: >
        One contacts (CardDAV) onboarding choice — a discovered RFC 6764
        context-root URL plus how to authenticate. No host/port (CardDAV is
        HTTP): the wizard confirms the url, then lists its addressbooks.
      properties:
        url: { type: string, format: uri, description: CardDAV context-root URL. }
        auth: { $ref: "#/components/schemas/AuthMethod" }
    AuthMethod:
      type: object
      description: >
        A discovered authentication method. `kind` discriminates; OAuth
        variants carry the endpoints where known.
      required: [kind]
      properties:
        kind:
          type: string
          enum: [password, bearer, oauth, oauth_device, oauth_issuer]
        authorization_endpoint: { type: string, description: "oauth: authorization endpoint" }
        token_endpoint: { type: string, description: "oauth / oauth_device: token endpoint" }
        device_authorization_endpoint: { type: string, description: "oauth_device: device endpoint" }
        scope: { type: [string, "null"] }
        issuer: { type: string, description: "oauth_issuer: the issuer URL" }
    CreateWatch:
      type: object
      required: [id, imap_host, login, notify_url, hmac_secret]
      properties:
        id: { type: string }
        source_kind:
          type: string
          enum: [imap, carddav]
          default: imap
          description: >
            `imap` (default) watches a mailbox over held IDLE. `carddav`
            polls the `carddav_url` addressbook; `imap_host`/`login` then
            carry the identity (host + login) that keys the mailbox.
        imap_host: { type: string }
        imap_port: { type: integer, default: 993 }
        login: { type: string }
        password:
          type: string
          description: >
            The mailbox password — stored (encrypted) on the watch and used to
            watch it (§ SERVICE_MODEL v3). Omit only to reuse a stored OAuth
            credential (proven at `/oauth/callback`).
        mailbox:
          type: string
          default: INBOX
          description: "IMAP folder, or a display name for a CardDAV addressbook."
        notify_url: { type: string, format: uri }
        hmac_secret: { type: string }
        active: { type: boolean, default: true }
        carddav_url:
          type: string
          format: uri
          description: "CardDAV collection URL (required when source_kind=carddav)."
    WatchView:
      type: object
      properties:
        id: { type: string }
        source_kind: { type: string, enum: [imap, carddav] }
        imap_host: { type: string }
        imap_port: { type: integer }
        login: { type: string }
        mailbox: { type: string }
        notify_url: { type: string }
        active: { type: boolean }
        carddav_url: { type: string, description: "CardDAV collection URL; absent for IMAP." }
    RotateRequest:
      type: object
      properties:
        new_secret: { type: [string, "null"] }
        overlap_secs: { type: [integer, "null"] }
    DeliveryView:
      type: object
      properties:
        account: { type: string }
        event: { type: string, enum: [new, changed, flags_added, flags_removed, removed] }
        uid:
          type: integer
          description: >
            Affected IMAP UID. `0` for a CardDAV delivery, which identifies
            the changed contact by an opaque href reference in the webhook
            payload's `resource` field instead (flag events never occur).
        ok: { type: boolean }
        status: { type: [integer, "null"] }
        error: { type: [string, "null"] }
        attempts: { type: integer }
        at: { type: integer }
    AccountView:
      type: object
      description: >
        Carillon account view: the prepaid credit pool and each service's
        activation state (§ BILLING_MODEL). One credit = one service-month.
      properties:
        id: { type: string }
        email: { type: [string, "null"], description: Magic-link email identity, if any. }
        credits: { type: integer, description: Fungible credit-pool balance. }
        mailboxes:
          type: array
          description: The account's services (billed units) + any proven-but-unwatched mailboxes.
          items:
            type: object
            properties:
              mailbox_key: { type: string }
              watch_id: { type: [string, "null"], description: The service (watch) on this PIM account, if any. }
              mailbox: { type: [string, "null"], description: The watched folder — distinguishes several services on one PIM account. }
              watching_until: { type: [integer, "null"], description: Unix time watching is paid up to. }
              watching: { type: boolean, description: Currently watching (paid month in the future). }
              auto_renew: { type: boolean, description: Next credit drawn from the pool at expiry. }
    AuthRequest:
      type: object
      required: [login, password]
      properties:
        protocol:
          type: string
          enum: [imap, carddav]
          default: imap
          description: >
            Selects how the credential is validated (IMAP LOGIN vs a CardDAV
            PROPFIND) and the PIM account's protocol. The proven credential is
            stored per identity and shared across its protocols.
        imap_host: { type: string, description: "Required for protocol=imap." }
        imap_port: { type: integer, default: 993 }
        login: { type: string }
        password: { type: string }
        mailbox: { type: string, default: INBOX }
        carddav_url:
          type: string
          format: uri
          description: "CardDAV context-root URL (required when protocol=carddav)."
    AuthResult:
      type: object
      properties:
        account_id: { type: string }
        action: { type: string, enum: [created, recovered, joined] }
        link: { type: string, description: The capability link (bearer). Store it. }
        protocol: { type: string, enum: [imap, carddav] }
        watchable: { type: boolean }
        idle: { type: boolean, description: "IMAP only; false for CardDAV." }
        qresync: { type: boolean, description: "IMAP only; false for CardDAV." }
