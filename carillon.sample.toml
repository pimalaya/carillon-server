# Carillon watch server — sample configuration.
#
# Copy to `carillon.toml` and edit. This file is INFRASTRUCTURE ONLY:
# the sqlite store, the age key and a few tuning knobs. Watches
# (accounts) do not live here — they live in the store. Add them at
# runtime through the control API, or in bulk with:
#
#   carillon import accounts.toml
#
# (see `accounts.sample.toml`). Everything below has a default, so an
# empty file is a valid config.

[server]
# sqlite database (watches + delivery log). `~` is expanded.
db = "~/.local/share/carillon/carillon.db"
# age identity file, generated (mode 0600) if absent, used to encrypt
# watch passwords at rest.
age_key_file = "~/.local/share/carillon/age.key"
# Ceiling on simultaneous TLS handshakes (reconnect-storm throttle).
max_concurrent_handshakes = 50
# Safety-net interval (seconds) at which the supervisor re-reads the
# store, on top of API-triggered reconciles.
reconcile_interval_secs = 60
# SSRF egress guard. Default false = REFUSE outbound IMAP/webhook connects to
# loopback/private/link-local addresses (the safe production posture). Set true
# for local dev or a self-host that watches a LAN mail server or posts to a
# loopback webhook sink (e.g. examples/webhook_sink.rs on 127.0.0.1).
# allow_private_targets = true

[api]
# Listen address of the HTTP control API.
listen = "127.0.0.1:3000"
# Serve a built carillon-admin dist/ at the origin (self-host + UI).
# ui_dir = "/var/lib/carillon/ui"
# Allow a cross-origin CDN front to call the API (SaaS).
# cors_allow_origin = "https://app.carillon.example.org"
# Master bearer token granting UNSCOPED, fleet-wide access to every
# account (ops / headless self-host). Sent as `Authorization: Bearer …`.
# Unset (default) = there is no unscoped access; every data route is
# reachable only through a per-account capability link. Keep it long and
# secret — it is the whole fleet's key.
# admin_token = "change-me-to-a-long-random-secret"
# Public base URL of this API, used to build the OAuth redirect URI
# ({public_url}/oauth/callback). Defaults to http://{listen} (fine for
# local self-host); set it to the externally reachable URL when exposed.
# public_url = "https://carillon.example.org"
# Base URL of the dashboard the OAuth callback popup posts back to (its
# origin is the postMessage target). Defaults to public_url.
# dashboard_url = "https://app.carillon.example.org"

# OAuth client overrides — your own registered apps instead of the built-in
# Thunderbird public clients. Needed to use a hosted redirect URI (register
# {public_url}/oauth/callback with the provider). Fastmail needs nothing here
# (it uses RFC 7591 dynamic registration). Public PKCE clients have no secret.
# [oauth.google]
# client_id = "…apps.googleusercontent.com"
# client_secret = "…"        # omit for a public client
# [oauth.microsoft]
# client_id = "…"

# Payment provider. Unset (default) = the keyless STUB provider (checkout
# returns a placeholder URL and the webhook activates on trust) — fine for local
# dev. Configure [billing.stripe] to take real money. Each MAILBOX is
# subscribed independently (per-mailbox subscription); hosted Checkout needs
# ONLY the secret key server-side — no publishable key. In production inject the
# secrets via systemd LoadCredential, not this file (see docs/DEPLOY_HARDENING.md).
# Create the recurring Prices in the Stripe dashboard; the price lives THERE.
# [billing.stripe]
# secret_key = "sk_test_…"          # sandbox key; sk_live_… in production
# webhook_secret = "whsec_…"        # from `stripe listen` or the dashboard endpoint
# success_url and cancel_url are OPTIONAL — default to `dashboard_url` (or
# `public_url`) with a ?checkout=success/cancel marker. Set them to override:
# success_url = "https://app.carillon.example.org/?checkout=success"
# cancel_url  = "https://app.carillon.example.org/?checkout=cancel"
# [billing.stripe.prices]           # plan id → RECURRING Stripe Price id
# month = "price_…"                 # e.g. €1/month
# year  = "price_…"                 # e.g. €10/year (2 months free — the discount)
